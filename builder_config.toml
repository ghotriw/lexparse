# Path to the Wiktionary dump file (JSONL)
input_file = "./tmp/raw-wiktextract-data.jsonl"

# Only include entries with this lang_code (leave empty to disable filtering)
lang_code = "en"

# Mapping of Wiktionary categories to internal parser category names
[target_categories]
"English idioms" = "idiom"
"English phrasal verbs" = "phrasal_verb"
"English proverbs" = "proverb"
